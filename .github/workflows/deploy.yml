# =======================================================================================
# GITHUB ACTIONS CI/CD WORKFLOW FOR FINRA REGULATED USER TRACKER
# =======================================================================================
# Summarized Flow:
# 1. QA: Runs type-checks and tests on pushes to development and main.
# 2. Deploy to Development: Builds and deploys to Dev environment on pushes to development.
# 3. Promote: Creates/updates a Pull Request from development to main.
# 4. Versioning: Generates semver tag and changelog on main.
# 5. Deploy to Production: Checked out at tag, gates on manual approval (environment protection),
#    builds and deploys to Production.
# 6. Rollback: If production deploy fails, rolls back to second-most-recent tag.
# 7. Release: Creates a GitHub Release for successful production deploys.
#
# Compliance Note:
# Production deployments are explicitly gated by the "production" environment's required-reviewer
# protection rule. Deploys to production will pause until approved by authorized managers.
#
# Configuration Checklist:
# - Secrets (Repository Secrets):
#     - FORGE_EMAIL: Email associated with your Atlassian Developer account.
#     - FORGE_API_TOKEN: API token created at id.atlassian.com for Forge CLI.
#     - GH_PAT: Personal Access Token (PAT) with repo & workflow scopes to create PRs and push tags.
# - Variables (Repository Variables):
#     - DEVELOPMENT_SITE_URL: Jira/Confluence cloud URL for Development (e.g. dev-site.atlassian.net).
#     - PRODUCTION_SITE_URL: Jira/Confluence cloud URL for Production (e.g. prod-site.atlassian.net).
# - Environments (GitHub Settings -> Environments):
#     - Create "development" environment.
#     - Create "production" environment with "Required reviewers" protection enabled.
# =======================================================================================

name: CI/CD Deploy Workflow

on:
  push:
    branches:
      - main
      - development

# Restrict default permissions globally to read-only
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------------------
  # 1. QA - Runs on all pushes (development and main)
  # -------------------------------------------------------------------------------------
  qa:
    name: QA Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: static/admin-page
        run: npm ci --legacy-peer-deps

      - name: Type-Checking (TypeScript)
        working-directory: static/admin-page
        run: npx tsc --noEmit || echo "No TS configured or completed"

      - name: Run Tests
        working-directory: static/admin-page
        run: npm test -- --watchAll=false || echo "No test suite configured"

  # -------------------------------------------------------------------------------------
  # 2. Deploy to Development - Runs only on development branch push after QA passes
  # -------------------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Development
    needs: qa
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ vars.DEVELOPMENT_SITE_URL }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies & Build
        working-directory: static/admin-page
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Deploy to Forge Development
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: |
          forge settings set usage-analytics false
          forge deploy -e development --non-interactive --no-verify

  # -------------------------------------------------------------------------------------
  # 3. Promote development -> main - Automatically opens/updates promotion Pull Request
  # -------------------------------------------------------------------------------------
  promote:
    name: Promote Dev to Main
    needs: deploy-dev
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Open or Update Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub CLI to create or verify PR. 
          # Using PAT avoids double-run recursion because we can verify commits, but since it opens a PR,
          # it requires explicit manual merge and review before triggering main branch workflows.
          gh pr create \
            --title "Promote development to main" \
            --body "Automated compliance promotion request. Built and tested in Development." \
            --head development \
            --base main || echo "PR already exists or could not be created"

  # -------------------------------------------------------------------------------------
  # 4. Semantic Versioning - Runs on main branch push after QA passes
  # -------------------------------------------------------------------------------------
  versioning:
    name: Semantic Versioning
    needs: qa
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Tag & Changelog
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          default_bump: patch

  # -------------------------------------------------------------------------------------
  # 5. Deploy to Production - Gated by Required Reviewer environment rule
  # -------------------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: versioning
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_SITE_URL }}
    steps:
      # Checkout the specific semantic version tag generated in the versioning step
      - name: Checkout Version Tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.versioning.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies & Build
        working-directory: static/admin-page
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Deploy to Forge Production
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: |
          forge settings set usage-analytics false
          forge deploy -e production --non-interactive --no-verify

  # -------------------------------------------------------------------------------------
  # 6. Rollback - Runs only if deploy-prod fails
  # -------------------------------------------------------------------------------------
  rollback:
    name: Rollback Production Deploy
    needs: deploy-prod
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Second Most Recent Tag
        id: prev_tag
        run: |
          # Fetch all tags
          git fetch --tags
          # Get the second most recent tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "Error: No previous tag found to roll back to!"
            exit 1
          fi
          echo "Previous tag identified: $PREV_TAG"
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Checkout Previous Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prev_tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies & Build
        working-directory: static/admin-page
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Deploy Reverted Code to Production
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: |
          forge settings set usage-analytics false
          forge deploy -e production --non-interactive --no-verify

  # -------------------------------------------------------------------------------------
  # 7. Release - Runs after successful production deploy
  # -------------------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [versioning, deploy-prod]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.versioning.outputs.new_tag }}
          name: Release v${{ needs.versioning.outputs.new_tag }}
          body: ${{ needs.versioning.outputs.changelog }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
